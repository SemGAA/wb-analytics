services:
  mysql:
    image: mysql:8.0
    container_name: wb_analytics_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wb_analytics
      MYSQL_USER: wb_user
      MYSQL_PASSWORD: wb_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
